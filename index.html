<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kindshift</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <title>kindshift</title>
      <h1>kindshift</h1>
      <p>simple caregiving schedules for care teams</p>
    </header>

    <main>
      <section class="customize-card">
        <h2>Customize Schedule</h2>

        <label for="week-start">Week starts on</label>
        <select id="week-start">
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option>Sunday</option>
        </select>

        <label for="schedule-view">Schedule view</label>
        <select id="schedule-view">
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>

        <div id="week-picker-section">
          <label for="week-start-date">Date in selected week</label>
          <input id="week-start-date" type="date" />
        </div>

        <div id="month-picker-section" class="hidden">
          <label for="month-picker">Month</label>
          <input id="month-picker" type="month" />
        </div>

        <div id="month-picker-section" class="hidden">
          <label for="month-picker">Month</label>
          <input id="month-picker" type="month" />
        </div>

        <label for="shift-style">Shift style</label>
        <select id="shift-style">
          <option value="one">1 shift per day</option>
          <option value="two">2 shifts per day</option>
          <option value="three">3 shifts per day</option>
          <option value="custom">custom shifts</option>
        </select>

        <div id="custom-shift-section" class="custom-shift-section hidden">
          <label for="custom-shift-name">Custom shift name</label>

          <div class="custom-shift-controls">
            <input
              id="custom-shift-name"
              type="text"
              placeholder="Example: Evening"
            />
            <button id="add-shift-button" type="button">Add Shift</button>
          </div>

          <h3>Current shifts</h3>
          <ul id="shift-list"></ul>
        </div>

        <div class="caregiver-section">
          <label for="caregiver-name">Caregiver name</label>

          <div class="caregiver-controls">
            <input
              id="caregiver-name"
              type="text"
              placeholder="Example: Alex"
            />
            <button id="add-caregiver-button" type="button">
              Add Caregiver
            </button>
          </div>

          <h3>Caregivers</h3>
          <ul id="caregiver-list"></ul>
        </div>
      </section>

      <section>
        <h2 id="schedule-title">Weekly Schedule</h2>
        <p id="week-label">Monday - Sunday</p>

        <button id="clear-schedule-button" type="button">Clear Schedule</button>
      </section>

      <section id="schedule"></section>

      <section class="notes-card">
        <h2>Schedule Notes</h2>

        <textarea
          id="schedule-note"
          placeholder="Add schedule notes here..."
        ></textarea>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
